<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>WALK AND TURN TEST</title><style>
:root {
  --bg:#080a0f; --panel:#111827; --panel2:#0b1220; --gold:#d6a21e; --blue:#102a43;
  --text:#f4f6fb; --muted:#c8d1df; --line:#2f3b4d; --danger:#f6c65b;
}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,var(--bg),#050608);font-family:Arial,Helvetica,sans-serif;color:var(--text);line-height:1.42}
.form-wrap{max-width:920px;margin:0 auto;padding:18px} header{border:1px solid var(--gold);background:linear-gradient(135deg,var(--panel),var(--blue));border-radius:14px;padding:18px 18px;margin-bottom:16px;box-shadow:0 0 0 2px rgba(214,162,30,.12)}
h1{margin:0 0 4px;font-size:1.65rem;letter-spacing:.04em;color:var(--gold)} .subtitle{color:var(--muted);font-size:.95rem}.section{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:14px;padding:16px;margin:14px 0}.section h2{font-size:1.1rem;margin:0 0 10px;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:8px}.check-row,.score-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}.check-row:last-child,.score-row:last-child{border-bottom:0} input[type="checkbox"]{width:22px;height:22px;min-width:22px;margin-top:1px;accent-color:var(--gold);cursor:pointer} label{cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.pill{border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--panel2)}.score-table{width:100%;border-collapse:collapse;margin-top:8px}.score-table th,.score-table td{border:1px solid var(--line);padding:9px;text-align:left}.score-table th{color:var(--gold);background:var(--panel2)}.score-table td.center{text-align:center}.notes{width:100%;min-height:95px;background:#060a12;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px;resize:vertical}.total{display:flex;flex-wrap:wrap;gap:12px;align-items:center}.total input{width:86px;background:#060a12;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:1rem}.hint{color:var(--muted);font-size:.9rem}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{background:var(--gold);color:#151000;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}button.secondary{background:#1d2b3f;color:var(--text);border:1px solid var(--line)}@media print{body{background:#fff;color:#000}.form-wrap{max-width:none}.section,header{box-shadow:none;background:#fff;color:#000;border-color:#000}.subtitle,.hint{color:#333}.notes,.total input{background:#fff;color:#000}.btns{display:none}h1,.section h2,.score-table th{color:#000;background:#eee}}
</style></head><body><main class="form-wrap"><header><h1>WALK AND TURN TEST</h1><div class="subtitle">Interactive SFST checklist form - click boxes to mark completed items/clues.</div></header><section class="section"><h2>Instruction Stage</h2><div class="check-row"><input type="checkbox" id="wat_left_line"><label for="wat_left_line">Place your left foot on a line, real or imaginary, and put your right heel against the toe of the left foot.</label></div><div class="check-row"><input type="checkbox" id="wat_arms_side"><label for="wat_arms_side">Place your arms by your sides.</label></div><div class="check-row"><input type="checkbox" id="wat_maintain"><label for="wat_maintain">Maintain this position and do not do anything until told to start.</label></div><div class="check-row"><input type="checkbox" id="wat_understand_1"><label for="wat_understand_1">Do you understand?</label></div></section><section class="section"><h2>Walking Stage</h2><div class="check-row"><input type="checkbox" id="wat_nine_steps"><label for="wat_nine_steps">When told to start, take nine heel-to-toe steps along a line, and nine heel-to-toe steps back down the line.</label></div><div class="check-row"><input type="checkbox" id="wat_turn"><label for="wat_turn">On the ninth step, keep your front foot on the line and turn by taking several small steps with the other foot.</label></div><div class="check-row"><input type="checkbox" id="wat_count_watch"><label for="wat_count_watch">Keep your arms by your side, count your steps out loud, and keep watching your feet.</label></div><div class="check-row"><input type="checkbox" id="wat_do_not_stop"><label for="wat_do_not_stop">Once you begin to walk, do not stop until the test is completed.</label></div><div class="check-row"><input type="checkbox" id="wat_understand_2"><label for="wat_understand_2">Do you understand?</label></div></section><section class="section"><h2>Clues</h2><div class="check-row"><input type="checkbox" id="wat_cant_balance"><label for="wat_cant_balance">Can&#x27;t balance during instructions</label></div><div class="check-row"><input type="checkbox" id="wat_starts_too_soon"><label for="wat_starts_too_soon">Starts too soon</label></div><div class="check-row"><input type="checkbox" id="wat_stops"><label for="wat_stops">Stops while walking</label></div><div class="check-row"><input type="checkbox" id="wat_misses_heel"><label for="wat_misses_heel">Misses heel to toe</label></div><div class="check-row"><input type="checkbox" id="wat_steps_off"><label for="wat_steps_off">Steps off the line</label></div><div class="check-row"><input type="checkbox" id="wat_uses_arms"><label for="wat_uses_arms">Uses arms to balance</label></div><div class="check-row"><input type="checkbox" id="wat_bad_turn"><label for="wat_bad_turn">Turned improperly</label></div><div class="check-row"><input type="checkbox" id="wat_wrong_steps"><label for="wat_wrong_steps">Wrong number of steps</label></div><div class="check-row"><input type="checkbox" id="wat_cannot"><label for="wat_cannot">Cannot perform test (test stopped or not requested for suspect safety).</label></div></section><section class="section"><h2>Total / Notes</h2><div class="total"><label>Total Score: <input type="number" id="wat_total" min="0" max="8"></label><span class="hint">Decision Point: 2; Max: 8</span></div><p><label>Notes:<textarea id="wat_notes" class="notes"></textarea></label></p></section><div class="btns"><button type="button" onclick="window.print()">Print / Save PDF</button><button type="button" class="secondary" onclick="document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);document.querySelectorAll('textarea,input[type=number],input[type=text]').forEach(i=>i.value='');localStorage.removeItem(location.pathname)">Clear Form</button></div></main><script>
const key='sfst-form:'+document.title;
function save(){const data={};document.querySelectorAll('input,textarea').forEach(el=>{if(el.type==='checkbox')data[el.id]=el.checked;else data[el.id]=el.value;});localStorage.setItem(key,JSON.stringify(data));}
function load(){try{const data=JSON.parse(localStorage.getItem(key)||'{}');document.querySelectorAll('input,textarea').forEach(el=>{if(Object.prototype.hasOwnProperty.call(data,el.id)){if(el.type==='checkbox')el.checked=!!data[el.id];else el.value=data[el.id];}})}catch(e){}}
document.addEventListener('input',save);document.addEventListener('change',save);load();
</script></body></html>
